name: Update pluginmaster

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-pluginmaster:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Generate pluginmaster.json
        run: python generate_pluginmaster.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add pluginmaster.json
          git diff --cached --quiet || git commit -m "Update pluginmaster.json"
          git push
